# C 任务 — Variant A：全参数 SFT，通用数据（llava_general）
# 请先保证 teacher_responses 里 image 路径可读（可设 COCO_ROOT / PREFIX_FROM+PREFIX_TO，见 run_c_task_variant_a_two_idle.sh）
# DeepSpeed（deepspeed_zero2_bf16_c_task.json）：micro_batch/gpu=1，grad_accum=4 → 全局有效 batch = 1×GPU数×4（双卡为 8）
train_jsonl: "data/c_task_splits/teacher_general.jsonl"
out_dir: "runs/variant_a_full_sft_general"
deepspeed_config: "configs/deepspeed_zero2_bf16_c_task.json"

variant: A
input_format: teacher_responses
teacher_target: answer_only
min_confidence: 0
skip_missing_image: true

student_model_id: "Qwen/Qwen3-VL-2B-Instruct"
lr: 2.0e-5
lr_scheduler: cosine
warmup_ratio: 0.03

lora_r: 0
bf16: true
num_epochs: 1
max_steps: 0
max_length: 4096
save_every: 0
seed: 42
