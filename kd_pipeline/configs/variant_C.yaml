# Variant C — 在 kd_pipeline 目录下运行: python scripts/train_distill.py --config configs/variant_C.yaml
train_jsonl: "data/sample_train.jsonl"
teacher_topk_jsonl: "data/teacher_topk.jsonl"
out_dir: "runs/variant_c_yaml"
variant: C
student_model_id: "Qwen/Qwen3-VL-2B-Instruct"
lam1: 0.5
lam3: 0.5
temperature: 4.0
lr: 2.0e-5
max_steps: 0
num_epochs: 1
# 与技术方案「每 500 step 存 ckpt」对齐时可设 500（此处为 optimizer step = 样本步）
save_every: 0
seed: 42
lora_r: 64
lora_alpha: 128
bf16: true
